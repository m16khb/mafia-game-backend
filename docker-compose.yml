version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mafia-game-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mafia_game
      MYSQL_USER: mafia_user
      MYSQL_PASSWORD: mafia_pass123
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/init:/docker-entrypoint-initdb.d
    networks:
      - mafia-network
    command: --mysql-native-password=ON

  redis:
    image: redis:7
    container_name: mafia-game-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - mafia-network
    command: redis-server --appendonly yes

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  mafia-network:
    driver: bridge
